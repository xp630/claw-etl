<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 低代码平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
    <!-- Logo & Title -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-indigo-600 rounded-xl mx-auto mb-4 flex items-center justify-center">
        <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-800">低代码平台</h1>
      <p class="text-gray-500 mt-1">内部研发工具</p>
    </div>

    <!-- Login Form -->
    <form class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
        <input type="email" placeholder="请输入工作邮箱" 
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
        <input type="password" placeholder="请输入密码" 
               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition">
      </div>
      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center">
          <input type="checkbox" class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
          <span class="ml-2 text-gray-600">记住我</span>
        </label>
        <a href="#" class="text-indigo-600 hover:text-indigo-500">忘记密码？</a>
      </div>
      <button type="submit" class="w-full bg-indigo-600 text-white py-2 px-4 rounded-lg font-medium hover:bg-indigo-700 transition">
        登录
      </button>
    </form>

    <!-- Divider -->
    <div class="flex items-center my-6">
      <div class="flex-1 border-t border-gray-300"></div>
      <span class="px-4 text-gray-400 text-sm">或</span>
      <div class="flex-1 border-t border-gray-300"></div>
    </div>

    <!-- Feishu SSO -->
    <button class="w-full flex items-center justify-center gap-3 bg-indigo-50 border border-indigo-200 text-indigo-700 py-3 px-4 rounded-lg font-medium hover:bg-indigo-100 transition">
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
      使用飞书登录
    </button>

    <!-- Footer -->
    <p class="text-center text-gray-400 text-xs mt-6">
      登录即表示同意 <a href="#" class="text-indigo-500">使用条款</a> 和 <a href="#" class="text-indigo-500">隐私政策</a>
    </p>
  </div>
</body>
</html>
