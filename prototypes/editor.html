<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面编辑器 - 低代码平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .canvas-area { background-image: linear-gradient(#e5e7eb 1px, transparent 1px), linear-gradient(90deg, #e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
  </style>
</head>
<body class="bg-gray-100">
  <!-- Top Toolbar -->
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="flex items-center justify-between px-4 py-2">
      <div class="flex items-center gap-4">
        <a href="dashboard.html" class="flex items-center gap-2 text-gray-600 hover:text-gray-800">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          返回
        </a>
        <div class="h-6 w-px bg-gray-300"></div>
        <input type="text" value="用户管理后台" class="text-lg font-medium text-gray-800 bg-transparent border-none outline-none focus:bg-gray-50 px-2 py-1 rounded">
        <span class="px-2 py-1 bg-yellow-100 text-yellow-700 text-xs rounded-full">草稿</span>
      </div>
      <div class="flex items-center gap-3">
        <button class="flex items-center gap-2 px-3 py-1.5 text-gray-600 hover:bg-gray-100 rounded-lg">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
          </svg>
          保存
        </button>
        <a href="preview.html" class="flex items-center gap-2 px-3 py-1.5 text-gray-600 hover:bg-gray-100 rounded-lg">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
          预览
        </a>
        <button class="flex items-center gap-2 px-4 py-1.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
          发布
        </button>
      </div>
    </div>
  </nav>

  <div class="flex h-[calc(100vh-56px)]">
    <!-- Left Panel - Component Library -->
    <aside class="w-64 bg-white border-r border-gray-200 overflow-y-auto">
      <div class="p-4">
        <h3 class="text-sm font-semibold text-gray-500 uppercase mb-3">基础组件</h3>
        <div class="grid grid-cols-2 gap-2">
          <div class="drag-item p-3 bg-gray-50 hover:bg-indigo-50 border border-gray-200 hover:border-indigo-300 rounded-lg cursor-move text-center" draggable="true">
            <svg class="w-6 h-6 mx-auto text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/>
            </svg>
            <span class="text-xs text-gray-600 mt-1 block">按钮</span>
          </div>
          <div class="drag-item p-3 bg-gray-50 hover:bg-indigo-50 border border-gray-200 hover:border-indigo-300 rounded-lg cursor-move text-center" draggable="true">
            <svg class="w-6 h-6 mx-auto text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
            <span class="text-xs text-gray-600 mt-1 block">输入框</span>
          </div>
          <div class="drag-item p-3 bg-gray-50 hover:bg-indigo-50 border border-gray-200 hover:border-indigo-300 rounded-lg cursor-move text-center" draggable="true">
            <svg class="w-6 h-6 mx-auto text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <span class="text-xs text-gray-600 mt-1 block">文本</span>
          </div>
          <div class="drag-item p-3 bg-gray-50 hover:bg-indigo-50 border border-gray-200 hover:border-indigo-300 rounded-lg cursor-move text-center" draggable="true">
            <svg class="w-6 h-6 mx-auto text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            <span class="text-xs text-gray-600 mt-1 block">图片</span>
          </div>
          <div class="drag-item p-3 bg-gray-50 hover:bg-indigo-50 border border-gray-200 hover:border-indigo-300 rounded-lg cursor-move text-center" draggable="true">
            <svg class="w-6 h-6 mx-auto text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
            </svg>
            <span class="text-xs text-gray-600 mt-1 block">选择器</span>
          </div>
          <div class="drag-item p-3 bg-gray-50 hover:bg-indigo-50 border border-gray-200 hover:border-indigo-300 rounded-lg cursor-move text-center" draggable="true">
            <svg class="w-6 h-6 mx-auto text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/>
            </svg>
            <span class="text-xs text-gray-600 mt-1 block">复选框</span>
          </div>
        </div>
      </div>

      <div class="p-4 border-t border-gray-200">
        <h3 class="text-sm font-semibold text-gray-500 uppercase mb-3">高级组件</h3>
        <div class="grid grid-cols-2 gap-2">
          <div class="drag-item p-3 bg-gray-50 hover:bg-indigo-50 border border-gray-200 hover:border-indigo-300 rounded-lg cursor-move text-center" draggable="true">
            <svg class="w-6 h-6 mx-auto text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
            </svg>
            <span class="text-xs text-gray-600 mt-1 block">表格</span>
          </div>
          <div class="drag-item p-3 bg-gray-50 hover:bg-indigo-50 border border-gray-200 hover:border-indigo-300 rounded-lg cursor-move text-center" draggable="true">
            <svg class="w-6 h-6 mx-auto text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
            </svg>
            <span class="text-xs text-gray-600 mt-1 block">表单</span>
          </div>
          <div class="drag-item p-3 bg-gray-50 hover:bg-indigo-50 border border-gray-200 hover:border-indigo-300 rounded-lg cursor-move text-center" draggable="true">
            <svg class="w-6 h-6 mx-auto text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            <span class="text-xs text-gray-600 mt-1 block">图表</span>
          </div>
          <div class="drag-item p-3 bg-gray-50 hover:bg-indigo-50 border border-gray-200 hover:border-indigo-300 rounded-lg cursor-move text-center" draggable="true">
            <svg class="w-6 h-6 mx-auto text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/>
            </svg>
            <span class="text-xs text-gray-600 mt-1 block">标签页</span>
          </div>
        </div>
      </div>

      <div class="p-4 border-t border-gray-200">
        <h3 class="text-sm font-semibold text-gray-500 uppercase mb-3">容器</h3>
        <div class="space-y-2">
          <div class="drag-item p-3 bg-gray-50 hover:bg-indigo-50 border border-gray-200 hover:border-indigo-300 rounded-lg cursor-move" draggable="true">
            <div class="flex items-center gap-2">
              <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 5a1 1 0 011-1h14a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1V5z"/>
              </svg>
              <span class="text-sm text-gray-600">容器</span>
            </div>
          </div>
          <div class="drag-item p-3 bg-gray-50 hover:bg-indigo-50 border border-gray-200 hover:border-indigo-300 rounded-lg cursor-move" draggable="true">
            <div class="flex items-center gap-2">
              <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
              </svg>
              <span class="text-sm text-gray-600">卡片</span>
            </div>
          </div>
          <div class="drag-item p-3 bg-gray-50 hover:bg-indigo-50 border border-gray-200 hover:border-indigo-300 rounded-lg cursor-move" draggable="true">
            <div class="flex items-center gap-2">
              <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16"/>
              </svg>
              <span class="text-sm text-gray-600">分栏</span>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Canvas Area -->
    <main class="flex-1 bg-gray-100 overflow-auto p-6">
      <div class="canvas-area bg-white border-2 border-dashed border-gray-300 rounded-lg min-h-full mx-auto max-w-4xl" style="min-height: 600px;">
        <!-- Dropped components preview -->
        <div class="p-4 space-y-4">
          <!-- Header -->
          <div class="flex items-center justify-between p-4 bg-gray-50 border border-gray-200 rounded-lg">
            <div>
              <h2 class="text-xl font-bold text-gray-800">用户列表</h2>
              <p class="text-sm text-gray-500">管理所有员工信息</p>
            </div>
            <div class="flex gap-2">
              <button class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">添加用户</button>
              <button class="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">导出</button>
            </div>
          </div>

          <!-- Search & Filter -->
          <div class="flex items-center gap-4 p-4 bg-gray-50 border border-gray-200 rounded-lg">
            <input type="text" placeholder="搜索用户姓名或邮箱..." class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
            <select class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none">
              <option>全部部门</option>
              <option>技术部</option>
              <option>产品部</option>
              <option>运营部</option>
            </select>
            <button class="px-4 py-2 bg-white border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">筛选</button>
          </div>

          <!-- Table -->
          <div class="border border-gray-200 rounded-lg overflow-hidden">
            <table class="w-full">
              <thead class="bg-gray-50">
                <tr>
                  <th class="px-4 py-3 text-left text-sm font-medium text-gray-600">姓名</th>
                  <th class="px-4 py-3 text-left text-sm font-medium text-gray-600">邮箱</th>
                  <th class="px-4 py-3 text-left text-sm font-medium text-gray-600">部门</th>
                  <th class="px-4 py-3 text-left text-sm font-medium text-gray-600">角色</th>
                  <th class="px-4 py-3 text-left text-sm font-medium text-gray-600">状态</th>
                  <th class="px-4 py-3 text-left text-sm font-medium text-gray-600">操作</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-200">
                <tr class="hover:bg-gray-50">
                  <td class="px-4 py-3 text-sm text-gray-800">张三</td>
                  <td class="px-4 py-3 text-sm text-gray-600">zhangsan@company.com</td>
                  <td class="px-4 py-3 text-sm text-gray-600">技术部</td>
                  <td class="px-4 py-3 text-sm text-gray-600">管理员</td>
                  <td class="px-4 py-3"><span class="px-2 py-1 bg-green-100 text-green-700 text-xs rounded-full">在职</span></td>
                  <td class="px-4 py-3 text-sm"><button class="text-indigo-600 hover:text-indigo-800">编辑</button></td>
                </tr>
                <tr class="hover:bg-gray-50">
                  <td class="px-4 py-3 text-sm text-gray-800">李四</td>
                  <td class="px-4 py-3 text-sm text-gray-600">lisi@company.com</td>
                  <td class="px-4 py-3 text-sm text-gray-600">产品部</td>
                  <td class="px-4 py-3 text-sm text-gray-600">编辑者</td>
                  <td class="px-4 py-3"><span class="px-2 py-1 bg-green-100 text-green-700 text-xs rounded-full">在职</span></td>
                  <td class="px-4 py-3 text-sm"><button class="text-indigo-600 hover:text-indigo-800">编辑</button></td>
                </tr>
                <tr class="hover:bg-gray-50">
                  <td class="px-4 py-3 text-sm text-gray-800">王五</td>
                  <td class="px-4 py-3 text-sm text-gray-600">wangwu@company.com</td>
                  <td class="px-4 py-3 text-sm text-gray-600">运营部</td>
                  <td class="px-4 py-3 text-sm text-gray-600">查看者</td>
                  <td class="px-4 py-3"><span class="px-2 py-1 bg-yellow-100 text-yellow-700 text-xs rounded-full">休假</span></td>
                  <td class="px-4 py-3 text-sm"><button class="text-indigo-600 hover:text-indigo-800">编辑</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <!-- Right Panel - Properties -->
    <aside class="w-72 bg-white border-l border-gray-200 overflow-y-auto">
      <div class="p-4 border-b border-gray-200">
        <h3 class="font-semibold text-gray-800">属性配置</h3>
      </div>
      
      <!-- Component Props -->
      <div class="p-4 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">组件 ID</label>
          <input type="text" value="table_001" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm bg-gray-50">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">标题</label>
          <input type="text" value="用户列表" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">数据源</label>
          <select class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
            <option>用户表 (users)</option>
            <option>订单表 (orders)</option>
            <option>产品表 (products)</option>
          </select>
        </div>
        
        <div class="border-t border-gray-200 pt-4">
          <h4 class="text-sm font-medium text-gray-700 mb-3">列配置</h4>
          <div class="space-y-2">
            <div class="flex items-center justify-between p-2 bg-gray-50 rounded">
              <span class="text-sm text-gray-600">姓名</span>
              <button class="text-gray-400 hover:text-gray-600">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>
            <div class="flex items-center justify-between p-2 bg-gray-50 rounded">
              <span class="text-sm text-gray-600">邮箱</span>
              <button class="text-gray-400 hover:text-gray-600">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>
            <div class="flex items-center justify-between p-2 bg-gray-50 rounded">
              <span class="text-sm text-gray-600">部门</span>
              <button class="text-gray-400 hover:text-gray-600">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>
          </div>
          <button class="w-full mt-2 px-3 py-2 border border-dashed border-gray-300 rounded text-sm text-gray-500 hover:border-indigo-400 hover:text-indigo-600">
            + 添加列
          </button>
        </div>

        <div class="border-t border-gray-200 pt-4">
          <label class="flex items-center gap-2">
            <input type="checkbox" checked class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
            <span class="text-sm text-gray-700">显示搜索</span>
          </label>
          <label class="flex items-center gap-2 mt-2">
            <input type="checkbox" checked class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
            <span class="text-sm text-gray-700">启用分页</span>
          </label>
          <label class="flex items-center gap-2 mt-2">
            <input type="checkbox" class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
            <span class="text-sm text-gray-700">支持导出</span>
          </label>
        </div>
      </div>

      <!-- Style Section -->
      <div class="p-4 border-t border-gray-200">
        <h4 class="text-sm font-medium text-gray-700 mb-3">样式</h4>
        <div class="space-y-3">
          <div>
            <label class="block text-xs text-gray-500 mb-1">背景色</label>
            <div class="flex items-center gap-2">
              <div class="w-8 h-8 border border-gray-300 rounded cursor-pointer" style="background-color: #f9fafb;"></div>
              <input type="text" value="#f9fafb" class="flex-1 px-2 py-1 border border-gray-300 rounded text-xs">
            </div>
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">边框颜色</label>
            <div class="flex items-center gap-2">
              <div class="w-8 h-8 border border-gray-300 rounded cursor-pointer" style="background-color: #e5e7eb;"></div>
              <input type="text" value="#e5e7eb" class="flex-1 px-2 py-1 border border-gray-300 rounded text-xs">
            </div>
          </div>
          <div>
            <label class="block text-xs text-gray-500 mb-1">圆角</label>
            <input type="range" min="0" max="24" value="8" class="w-full">
            <div class="flex justify-between text-xs text-gray-400">
              <span>0px</span>
              <span>8px</span>
              <span>24px</span>
            </div>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <script>
    // Simple drag and drop interaction
    document.querySelectorAll('.drag-item').forEach(item => {
      item.addEventListener('dragstart', (e) => {
        e.dataTransfer.setData('text/plain', item.querySelector('span').textContent);
        item.classList.add('opacity-50');
      });
      item.addEventListener('dragend', (e) => {
        item.classList.remove('opacity-50');
      });
    });
  </script>
</body>
</html>
