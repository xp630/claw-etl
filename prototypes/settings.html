<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系统设置 - 低代码平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
  <!-- Top Navigation -->
  <nav class="bg-white shadow-sm border-b border-gray-200">
    <div class="flex items-center justify-between px-6 py-3">
      <div class="flex items-center gap-4">
        <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
        </div>
        <span class="font-semibold text-gray-800">低代码平台</span>
      </div>
      <div class="flex items-center gap-4">
        <button class="text-gray-500 hover:text-gray-700">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
          </svg>
        </button>
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 bg-indigo-100 rounded-full flex items-center justify-center">
            <span class="text-indigo-600 font-medium text-sm">霆</span>
          </div>
          <span class="text-sm text-gray-700">大霆</span>
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </div>
      </div>
    </div>
  </nav>

  <div class="flex">
    <!-- Sidebar -->
    <aside class="w-64 bg-white border-r border-gray-200 min-h-screen">
      <nav class="p-4 space-y-1">
        <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          <span>首页</span>
        </a>
        <a href="editor.html" class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
          </svg>
          <span>页面编辑器</span>
        </a>
        <a href="datasource.html" class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
          </svg>
          <span>数据源管理</span>
        </a>
        <a href="users.html" class="flex items-center gap-3 px-3 py-2 text-gray-600 hover:bg-gray-50 rounded-lg">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <span>用户管理</span>
        </a>
        <a href="settings.html" class="flex items-center gap-3 px-3 py-2 bg-indigo-50 text-indigo-700 rounded-lg">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <span class="font-medium">系统设置</span>
        </a>
      </nav>

      <div class="absolute bottom-4 left-4 w-56 p-4 bg-gray-50 rounded-lg border border-gray-200">
        <p class="text-xs text-gray-500 mb-2">当前环境</p>
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 bg-green-500 rounded-full"></span>
          <span class="text-sm font-medium text-gray-700">开发环境</span>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6">
      <!-- Header -->
      <div class="flex items-center justify-between mb-6">
        <div>
          <h1 class="text-2xl font-bold text-gray-800">系统设置</h1>
          <p class="text-gray-500 mt-1">管理平台配置和权限</p>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Left Column: Settings Groups -->
        <div class="lg:col-span-2 space-y-6">

          <!-- Environment Config -->
          <div class="bg-white rounded-xl border border-gray-200 p-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">环境配置</h2>
            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">当前环境</label>
                <div class="flex gap-4">
                  <label class="flex items-center gap-2 px-4 py-2 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 has-[:checked]:border-indigo-500 has-[:checked]:bg-indigo-50">
                    <input type="radio" name="env" value="dev" checked class="text-indigo-600">
                    <span class="text-sm font-medium text-gray-700">开发环境</span>
                  </label>
                  <label class="flex items-center gap-2 px-4 py-2 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-50 has-[:checked]:border-indigo-500 has-[:checked]:bg-indigo-50">
                    <input type="radio" name="env" value="prod" class="text-indigo-600">
                    <span class="text-sm font-medium text-gray-700">生产环境</span>
                  </label>
                </div>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">API 基础地址</label>
                  <input type="text" value="https://api.dev.company.com" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-600 bg-gray-50">
                </div>
                <div>
                  <label class="block text-sm font-medium text-gray-700 mb-2">超时时间（秒）</label>
                  <input type="text" value="30" class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm text-gray-600 bg-gray-50">
                </div>
              </div>
            </div>
          </div>

          <!-- Permission Settings -->
          <div class="bg-white rounded-xl border border-gray-200 p-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">权限设置</h2>
            <div class="space-y-4">
              <!-- Permission Row 1 -->
              <div class="flex items-center justify-between py-3 border-b border-gray-100">
                <div>
                  <p class="font-medium text-gray-800">页面编辑权限</p>
                  <p class="text-sm text-gray-500">允许用户创建和编辑页面</p>
                </div>
                <button class="relative w-11 h-6 bg-indigo-600 rounded-full transition-colors">
                  <span class="absolute right-0.5 top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform translate-x-0"></span>
                </button>
              </div>
              <!-- Permission Row 2 -->
              <div class="flex items-center justify-between py-3 border-b border-gray-100">
                <div>
                  <p class="font-medium text-gray-800">数据源管理权限</p>
                  <p class="text-sm text-gray-500">允许用户配置和管理数据源</p>
                </div>
                <button class="relative w-11 h-6 bg-indigo-600 rounded-full transition-colors">
                  <span class="absolute right-0.5 top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform translate-x-0"></span>
                </button>
              </div>
              <!-- Permission Row 3 -->
              <div class="flex items-center justify-between py-3 border-b border-gray-100">
                <div>
                  <p class="font-medium text-gray-800">用户管理权限</p>
                  <p class="text-sm text-gray-500">允许用户添加和移除团队成员</p>
                </div>
                <button class="relative w-11 h-6 bg-gray-200 rounded-full transition-colors">
                  <span class="absolute left-0.5 top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform -translate-x-0"></span>
                </button>
              </div>
              <!-- Permission Row 4 -->
              <div class="flex items-center justify-between py-3">
                <div>
                  <p class="font-medium text-gray-800">系统配置权限</p>
                  <p class="text-sm text-gray-500">允许用户修改系统级配置</p>
                </div>
                <button class="relative w-11 h-6 bg-gray-200 rounded-full transition-colors">
                  <span class="absolute left-0.5 top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform -translate-x-0"></span>
                </button>
              </div>
            </div>
          </div>
        </div>

        <!-- Right Column: System Info -->
        <div class="space-y-6">
          <!-- System Info Card -->
          <div class="bg-white rounded-xl border border-gray-200 p-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">系统信息</h2>
            <div class="space-y-3">
              <div class="flex justify-between text-sm">
                <span class="text-gray-500">版本号</span>
                <span class="text-gray-800 font-medium">v2.4.1</span>
              </div>
              <div class="flex justify-between text-sm">
                <span class="text-gray-500">构建时间</span>
                <span class="text-gray-800 font-medium">2024-01-10</span>
              </div>
              <div class="flex justify-between text-sm">
                <span class="text-gray-500">Node.js</span>
                <span class="text-gray-800 font-medium">v20.10.0</span>
              </div>
              <div class="flex justify-between text-sm">
                <span class="text-gray-500">数据库</span>
                <span class="text-gray-800 font-medium">PostgreSQL 15</span>
              </div>
              <div class="flex justify-between text-sm">
                <span class="text-gray-500">运行时长</span>
                <span class="text-gray-800 font-medium">15 天</span>
              </div>
            </div>
          </div>

          <!-- Danger Zone -->
          <div class="bg-white rounded-xl border border-red-200 p-6">
            <h2 class="text-lg font-semibold text-red-600 mb-4">危险区域</h2>
            <div class="space-y-3">
              <button class="w-full px-4 py-2 border border-red-300 text-red-600 rounded-lg text-sm font-medium hover:bg-red-50 transition">
                清除所有缓存
              </button>
              <button class="w-full px-4 py-2 border border-red-300 text-red-600 rounded-lg text-sm font-medium hover:bg-red-50 transition">
                重置系统配置
              </button>
            </div>
          </div>

          <!-- Save Button -->
          <button class="w-full bg-indigo-600 text-white px-4 py-2 rounded-lg font-medium hover:bg-indigo-700 transition">
            保存设置
          </button>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
